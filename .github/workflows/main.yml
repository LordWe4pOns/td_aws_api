name: Pipeline CICD projet Master

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: master_node_app
  REPO_URL: ghcr.io
  REPO_USER_LOWER: lordwe4pons

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lancer les tests
        run: ls -lah

  build:
    needs: test
    name: Build push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{env.IMAGE_NAME}} .

      - name: Run image
        run: docker run -d -p 3000:3000 ${{env.IMAGE_NAME}}
      
      - name: Tag image v1.0
        run: docker tag ${{env.IMAGE_NAME}} ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:1.0

      - name: Tag image latest
        run: docker tag ${{env.IMAGE_NAME}} ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:latest

      - name : GHCR Log in
        uses: docker/login-action@v2
        with:
          registry: ${{env.REPO_URL}}
          username: ${{env.REPO_USER_LOWER}}
          password: ${{secrets.CICDTOKEN}}

      - name: Push image v1.0
        run: docker push ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:1.0

      - name: Push image latest
        run: docker push ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:latest

  deploy:
    needs: build
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: connexion SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            echo ${{secrets.CICDTOKEN}} | docker login ghrc.io -u ${{env.REPO_USER_LOWER}} --password-stdin
            docker pull ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:latest
            docker run -d -p 3000:3000 --name ${{env.IMAGE_NAME}} ${{env.REPO_URL}}/${{env.REPO_USER_LOWER}}/${{env.IMAGE_NAME}}:latest
            curl localhost:3000